spring.application.name=CampusHub

# PostgreSQL
spring.datasource.url=jdbc:postgresql://localhost:5432/CampusHub
spring.datasource.username=postgres
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# JWT
jwt.secret=
jwt.expiration=86400000
# Multipart
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Mail — used by NotificationService to email students when assignments,
# events, or announcements are created. Leave the placeholder username as-is
# to disable sending (it's detected and skipped automatically); replace both
# values with a real account + Gmail "app password" to activate it.
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=
spring.mail.password=
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

cloudinary.cloud-name=twmcafd1
cloudinary.api-key=
cloudinary.api-secret=
server.port=8082

# Chatbot — attendance/marks/assignments/events/announcements are answered
# straight from CampusHub's own data, no external API needed for those.
# Leave api-url/api-key blank (default) to skip the external-AI fallback for
# anything outside that scope; set both to an OpenAI-compatible chat
# completions endpoint (e.g. https://api.openai.com/v1/chat/completions) to
# enable it.
ai.chatbot.api-url=
ai.chatbot.api-key=
ai.chatbot.model=gpt-4o-mini

# Google Calendar sync — each student connects their own Google account via
# OAuth (Settings page -> "Connect Google Calendar"); we then add an event to
# their calendar whenever a new assignment or campus event is posted. Leave
# client-id/client-secret blank (default) to keep this disabled — /api/calendar/connect
# will just report "not configured" instead of erroring. Get credentials from
# https://console.cloud.google.com/apis/credentials (OAuth client type: Web application)
# and add the redirect-uri below to its "Authorized redirect URIs".
google.oauth.client-id=
google.oauth.client-secret=
google.oauth.redirect-uri=http://localhost:8082/api/calendar/oauth2callback
google.oauth.frontend-redirect-base=http://localhost:5173